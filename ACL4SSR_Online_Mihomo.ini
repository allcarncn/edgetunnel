rules:
  # --- 广告拦截 (Anti-AD) ---
  - RULE-SET,ads_anti_domain,REJECT
  - RULE-SET,AD,REJECT
  - RULE-SET,EasyList,REJECT
  - RULE-SET,EasyListChina,REJECT
  - RULE-SET,EasyPrivacy,REJECT
  - RULE-SET,ProgramAD,REJECT
  
  # --- AI 服务分流 ---
  - RULE-SET,ai_domain,🤖 ChatGPT
  - RULE-SET,deepseek_domain,deepseek
  - RULE-SET,google_gemini_domain,GoogleGemini
  - RULE-SET,openai_domain,🤖 ChatGPT
  
  # --- Apple 生态 ---
  - RULE-SET,icloud_cn_domain,🍎 Apple_cn
  - RULE-SET,apple_cn_domain,🍎 Apple_cn
  - RULE-SET,apple_domain,🍎 Apple
  - RULE-SET,icloud_domain,🍎 Apple
  
  # --- 常用服务 ---
  - RULE-SET,facebook_domain,FaceBook
  - RULE-SET,github_domain,👨🏿‍💻 GitHub
  - RULE-SET,youtube_domain,📹 YouTube
  - RULE-SET,google_domain,🍀 Google
  - RULE-SET,onedrive_domain,🐬 OneDrive
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - RULE-SET,tiktok_domain,🎵 TikTok
  - RULE-SET,speedtest_domain,✈️ Speedtest
  - RULE-SET,telegram_domain,📲 Telegram
  - RULE-SET,netflix_domain,🎥 NETFLIX
  - RULE-SET,paypal_domain,💶 PayPal
  - RULE-SET,private_domain,🟢 直连
  
  # --- IP 分流规则 (放在域名之后) ---
  - RULE-SET,google_ip,🍀 Google,no-resolve
  - RULE-SET,netflix_ip,🎥 NETFLIX,no-resolve
  - RULE-SET,telegram_ip,📲 Telegram,no-resolve
  
  # --- 兜底规则 ---
  - RULE-SET,geolocation-!cn,🚀 节点选择
  - RULE-SET,cn_domain,🟢 直连
  - RULE-SET,cn_ip,🟢 直连
  - MATCH,🐟 漏网之鱼

rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}

rule-providers:
  # AI 类 (使用在线源)
  ai_domain: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml", path: ./rules/ai.yaml, interval: 86400}
  deepseek_domain: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/deepseek.yaml", path: ./rules/deepseek.yaml, interval: 86400}
  openai_domain: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/openai.yaml", path: ./rules/openai.yaml, interval: 86400}
  google_gemini_domain: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/google-gemini.yaml", path: ./rules/google_gemini.yaml, interval: 86400}
  
  # 广告拦截类
  ads_anti_domain: {type: http, behavior: domain, url: "https://anti-ad.net/clash.yaml", path: ./rules/anti_ads.yaml, interval: 86400}
  AD: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/earoftoast/clash-rules/main/AD.yaml", path: ./rules/AD.yaml, interval: 86400}
  EasyList: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/earoftoast/clash-rules/main/EasyList.yaml", path: ./rules/EasyList.yaml, interval: 86400}
  EasyListChina: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/earoftoast/clash-rules/main/EasyListChina.yaml", path: ./rules/EasyListChina.yaml, interval: 86400}
  EasyPrivacy: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/earoftoast/clash-rules/main/EasyPrivacy.yaml", path: ./rules/EasyPrivacy.yaml, interval: 86400}
  ProgramAD: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/earoftoast/clash-rules/main/ProgramAD.yaml", path: ./rules/ProgramAD.yaml, interval: 86400}
  
  # 其他服务类
  facebook_domain: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Facebook/Facebook.yaml", path: ./rules/Facebook.yaml, interval: 86400}
  icloud_cn_domain: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/icloud%40cn.yaml", path: ./rules/icloud@cn.yaml, interval: 86400}
  icloud_domain: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/icloud.yaml", path: ./rules/icloud.yaml, interval: 86400}
  apple_domain: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/apple.yaml", path: ./rules/apple.yaml, interval: 86400}
  apple_cn_domain: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/apple-cn.yaml", path: ./rules/apple-cn.yaml, interval: 86400}
  
  # 高性能 MRS 规则
  private_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs" }
  youtube_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs" }
  google_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs" }
  github_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs" }
  telegram_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs" }
  netflix_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs" }
  paypal_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/paypal.mrs" }
  onedrive_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/onedrive.mrs" }
  microsoft_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft.mrs" }
  speedtest_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/ookla-speedtest.mrs" }
  tiktok_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/tiktok.mrs" }
  geolocation-!cn: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs" }
  cn_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs" }
  cn_ip: { <<: *ip, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs" }
  google_ip: { <<: *ip, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/google.mrs" }
